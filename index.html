<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Sample</title>
</head>

<body>
   
    <!-- The h1 to h6 heading elements are used to signify the importance of content below them -->
<h1>Hello HTML</h1>
<h2>Hello HTML</h2>
<h3>Hello HTML</h3>
<h4>Hello HTML</h4>
<h5>Hello HTML</h5>
<h6>Hello HTML</h6>
<img src="img/prapor.jpeg" width="200" alt="prapor">

<!-- represents the dominant content of the <body> of a document -->
<main>

    <!-- The p element is used to create a paragraph of text on websites.  -->
<p>I am studying html now</p>

<!-- represents an unordered list of items, typically rendered as a bulleted list. -->
<ul>
    <li>html</li>
    <li>css</li>
    <li>javascript</li>
</ul>

<!-- reates a hyperlink to web pages, files, email addresses, locations in the same page, or anything else a URL can address. -->
<a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/a">Information about a</a>

</main>


</body>

</html>
