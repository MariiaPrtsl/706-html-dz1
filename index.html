<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Sample</title>
</head>

<body>

    <!-- h The h1 to h6 heading elements are used to signify the importance of content below them -->
    <h1>Hello HTML</h1>
    <h2>Hello HTML</h2>
    <h3>Hello HTML</h3>
    <h4>Hello HTML</h4>
    <h5>Hello HTML</h5>
    <h6>Hello HTML</h6>
    <!-- <figure> represents self-contained content, potentially with an optional caption -->
    <!-- The <em> HTML element marks text that has stress emphasis. -->
        <!-- The <strong> HTML element indicates that its contents have strong importance, seriousness, or urgency. Browsers typically render the contents in bold type. -->
    <figure>
        <img src="img/flag.jpeg" width="200" alt="flag">
        <figcaption><strong>Flag of </strong> <em>Ukraine</em></figcaption>
    </figure>
    <!--<main> represents the dominant content of the <body> of a document -->
    <main>

        <!--<section> element represents a generic standalone section of a document, which doesn't have a more specific semantic element to represent it -->
        <section>
        <!--<p> The p element is used to create a paragraph of text on websites.  -->
        <p>I am learning html now</p>

        <!-- <ul> represents an unordered list of items, typically rendered as a bulleted list. -->
        <ul>
            <li>html</li>
            <li>css</li>
            <li>javascript</li>
        </ul>

        <!-- The <ol> HTML element represents an ordered list of items — typically rendered as a numbered list. -->
        <ol>
            <li>html</li>
            <li>css</li>
            <li>javascript</li>
        </ol>

        </section>
        <!--a href reates a hyperlink to web pages, files, email addresses, locations in the same page, or anything else a URL can address. -->
        <a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/a">Information about a</a>

    </main>


</body>

</html>
